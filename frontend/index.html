<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEURAL_SNAKE_OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
    body {
      margin: 0;
      background-color: #000;
      color: #0ff;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    /* Scanlines overlay */
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0),
        rgba(255,255,255,0) 50%,
        rgba(0,0,0,0.2) 50%,
        rgba(0,0,0,0.2)
      );
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 9999;
    }

    /* CRT Flicker */
    .crt-flicker {
      animation: flicker 0.15s infinite;
      pointer-events: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 255, 255, 0.02);
      z-index: 9998;
    }

    @keyframes flicker {
      0% { opacity: 0.9; }
      50% { opacity: 1; }
      100% { opacity: 0.9; }
    }

    /* Glitch Text Effect */
    .glitch-wrapper {
      position: relative;
      display: inline-block;
    }
    
    .glitch-text {
      position: relative;
      display: inline-block;
      color: #0ff;
    }

    .glitch-text::before,
    .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }

    .glitch-text::before {
      left: 2px;
      text-shadow: -2px 0 #f0f;
      clip-path: inset(20% 0 80% 0);
      animation: glitch-anim-1 2s infinite linear alternate-reverse;
    }

    .glitch-text::after {
      left: -2px;
      text-shadow: -2px 0 #0ff;
      clip-path: inset(80% 0 20% 0);
      animation: glitch-anim-2 3s infinite linear alternate-reverse;
    }

    @keyframes glitch-anim-1 {
      0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); }
      20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
      40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
      60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
      80% { clip-path: inset(10% 0 70% 0); transform: translate(-2px, 1px); }
      100% { clip-path: inset(30% 0 50% 0); transform: translate(2px, -1px); }
    }

    @keyframes glitch-anim-2 {
      0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); }
      20% { clip-path: inset(30% 0 20% 0); transform: translate(-2px, 2px); }
      40% { clip-path: inset(70% 0 10% 0); transform: translate(2px, -2px); }
      60% { clip-path: inset(20% 0 50% 0); transform: translate(-2px, 1px); }
      80% { clip-path: inset(50% 0 30% 0); transform: translate(2px, -1px); }
      100% { clip-path: inset(5% 0 80% 0); transform: translate(-2px, 2px); }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000; border-left: 1px solid #f0f; }
    ::-webkit-scrollbar-thumb { background: #0ff; }
    ::-webkit-scrollbar-thumb:hover { background: #f0f; }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="crt-flicker"></div>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
